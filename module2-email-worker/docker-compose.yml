version: "3.9"

# ── Local dev stack mirrors AWS MSK configuration exactly ─────────────────
# Kafka: SASL_PLAINTEXT (local) → SASL_SSL (AWS MSK)
# Redis: AUTH token required (matches ElastiCache)
# PostgreSQL: IAM auth (local: password, AWS: IAM)
# ClamAV: ZINSTSTREAM protocol (same in both environments)

services:

  # ── Zookeeper ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: promptflow_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo ruok | nc localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: promptflow_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Mirrors MSK: PLAINTEXT for local, SASL_SSL for AWS
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Mirrors MSK config
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # JMX metrics (mirrors MSK open monitoring)
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka Topic Init ──────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: promptflow_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      bash -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ingest.raw --replication-factor 1 --partitions 6 --config retention.ms=604800000 --config compression.type=lz4 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dlq.ingestion.failed --replication-factor 1 --partitions 3 --config retention.ms=2592000000 &&
      echo 'Topics created:' &&
      kafka-topics --bootstrap-server kafka:29092 --list
      "
  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: promptflow_redis
    command: >
      redis-server --requirepass localdevtoken --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "localdevtoken", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: promptflow_postgres
    environment:
      POSTGRES_USER: promptflow
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: promptflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U promptflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ClamAV ────────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: promptflow_clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_CLAMD: "false"
    healthcheck:
      test: [ "CMD", "clamdcheck.sh" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s # ClamAV takes time to load signatures

  # ── Email Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptflow_email_worker
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      ALLOWED_DOMAIN: srmap.edu.in

      # Gmail OAuth2 — inject service account JSON
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
      GMAIL_DELEGATED_USER: "papers@srmap.edu.in"

      # Redis (matches ElastiCache auth_token format)
      REDIS_URL: "redis://:localdevtoken@redis:6379"

      # Kafka (PLAINTEXT local → SASL_SSL in AWS)
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
      KAFKA_TOPIC_INGEST: "ingest.raw"
      KAFKA_TOPIC_DLQ: "dlq.ingestion.failed"

      # AWS S3 (use localstack or real AWS)
      AWS_REGION: "ap-south-1"
      S3_INGESTION_BUCKET: "promptflow-ingestion-dev"
      S3_QUARANTINE_BUCKET: "promptflow-quarantine-dev"

      # ClamAV
      CLAMAV_HOST: "clamav"
      CLAMAV_PORT: "3310"

      # Database
      DATABASE_URL: "postgresql://promptflow:secret@postgres:5432/promptflow"

      # Worker
      POLL_INTERVAL_SECONDS: "60"
    ports:
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  redis_data:
  postgres_data:
  clamav_data:
