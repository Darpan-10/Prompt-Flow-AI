
# Module 2: Gmail Ingestion Worker
#
# Like Modules 5/6, this does NOT define its own Kafka/Zookeeper or Redis.
# The original version of this file spun up an independent Kafka +
# Zookeeper cluster (container names promptflow_kafka/promptflow_zookeeper)
# — completely separate from Module 4's Kafka cluster (m4_kafka). Both
# advertised themselves under the same in-network hostname ("kafka"),
# which is exactly the kind of split-brain that made Module 2's
# "ingest.raw" producer and Module 3's "ingest.raw" consumer talk to two
# different brokers that never shared a single message. Same story for
# the unused local Postgres (Module 2's code never actually touches
# Postgres — see app/config.py's dead database_url setting).
#
# Module 2 now joins Module 4's Docker network as external to reach its
# Kafka/Redis by hostname, same convention as Modules 5/6.
#
# Prerequisite:
#   cd ../module4-storage && docker compose up -d postgres redis kafka zookeeper kafka-init
#
# Then from THIS directory:
#   docker compose up -d --build
#
# See SETUP.md for the full walkthrough.

services:
  # ── ingest.raw topic init ──────────────────────────────────────────────
  # Module 4's own kafka-init only creates papers.validated/review/failed
  # and dlq.ingestion.failed (the topics ITS consumer cares about) — it
  # has no reason to know about ingest.raw, which is Module 2 -> Module 3's
  # topic. Module 2 is responsible for making sure its own output topic
  # exists on the shared broker.
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: m2_kafka_init
    command: |
      bash -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ingest.raw --replication-factor 1 --partitions 6 --config retention.ms=604800000 --config compression.type=lz4 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dlq.ingestion.failed --replication-factor 1 --partitions 3 --config retention.ms=2592000000 &&
      echo 'Topics ready:' &&
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - promptflow_shared_net

  # ── ClamAV ──────────────────────────────────────────────────────────────
  # Module-2-specific — no other module needs virus scanning, so this one
  # stays local rather than moving to Module 4.
  clamav:
    image: clamav/clamav:latest
    container_name: m2_clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_CLAMD: "false"
    healthcheck:
      test: [ "CMD", "clamdcheck.sh" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s # ClamAV takes time to load signatures
    networks:
      - promptflow_shared_net

  # ── Email Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m2_email_worker
    depends_on:
      clamav:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      ALLOWED_DOMAIN: srmap.edu.in

      # Gmail auth — "oauth_personal" (default, no admin needed) or
      # "service_account" (Workspace admin required). See SETUP.md
      # section 2 for how to obtain whichever set of credentials this
      # needs. oauth_personal's browser consent step can't run inside a
      # container — run `python scripts/gmail_oauth_login.py` on the
      # HOST first; the volume mounts below make that cached token
      # visible in here afterward.
      GMAIL_AUTH_MODE: "${GMAIL_AUTH_MODE:-oauth_personal}"
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
      GMAIL_DELEGATED_USER: "${GMAIL_DELEGATED_USER:-papers@srmap.edu.in}"
      GMAIL_OAUTH_CLIENT_SECRET_PATH: "/app/gmail_oauth_client_secret.json"
      GMAIL_OAUTH_TOKEN_PATH: "/app/gmail_oauth_token.json"

      # Redis — Module 4's instance (matches ElastiCache auth_token format)
      REDIS_URL: "redis://:localdevtoken@redis:6379"

      # Kafka — Module 4's broker (PLAINTEXT local -> SASL_SSL in AWS)
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
      KAFKA_TOPIC_INGEST: "ingest.raw"
      KAFKA_TOPIC_DLQ: "dlq.ingestion.failed"

      # AWS S3 (use localstack or real AWS)
      AWS_REGION: "ap-south-1"
      S3_INGESTION_BUCKET: "promptflow-ingestion-dev"
      S3_QUARANTINE_BUCKET: "promptflow-quarantine-dev"

      # ClamAV
      CLAMAV_HOST: "clamav"
      CLAMAV_PORT: "3310"

      # Database — Module 4's shared Postgres, for audit_log writes only
      DATABASE_URL: "postgresql://promptflow:secret@postgres:5432/promptflow"

      # Worker
      POLL_INTERVAL_SECONDS: "60"
    restart: on-failure
    volumes:
      # Only relevant for GMAIL_AUTH_MODE=oauth_personal — both files are
      # generated on the host (gmail_oauth_login.py needs a real browser,
      # which a container doesn't have). The token file is read-write
      # since the app refreshes it in place as the access token expires.
      - ./gmail_oauth_client_secret.json:/app/gmail_oauth_client_secret.json:ro
      - ./gmail_oauth_token.json:/app/gmail_oauth_token.json
    ports:
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - promptflow_shared_net

volumes:
  clamav_data:

networks:
  promptflow_shared_net:
    external: true
    name: promptflow_shared_net
