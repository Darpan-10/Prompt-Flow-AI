services:

  # ── Zookeeper ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: m3_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: m3_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka Topic Init ──────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: m3_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      bash -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ingest.raw --replication-factor 1 --partitions 6 --config retention.ms=604800000 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic papers.validated --replication-factor 1 --partitions 6 --config retention.ms=604800000 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic papers.review --replication-factor 1 --partitions 6 --config retention.ms=604800000 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic papers.failed --replication-factor 1 --partitions 3 --config retention.ms=2592000000 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dlq.ingestion.failed --replication-factor 1 --partitions 3 --config retention.ms=2592000000 &&
      echo 'All topics created:' &&
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: m3_redis
    command: redis-server --requirepass localdevtoken --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "localdevtoken", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: m3_postgres
    environment:
      POSTGRES_USER: promptflow
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: promptflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mock Directory API ────────────────────────────────────────────────
  mock-directory:
    build:
      context: ./mock_directory
      dockerfile: Dockerfile
    container_name: m3_mock_directory
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Module 3 Worker ───────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m3_ai_extraction_worker
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mock-directory:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO

      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP: module3-ai-extraction
      KAFKA_TOPIC_INGEST_RAW: ingest.raw
      KAFKA_TOPIC_PAPERS_VALIDATED: papers.validated
      KAFKA_TOPIC_PAPERS_REVIEW: papers.review
      KAFKA_TOPIC_PAPERS_FAILED: papers.failed
      KAFKA_TOPIC_DLQ: dlq.ingestion.failed

      REDIS_URL: "redis://:localdevtoken@redis:6379"

      AWS_REGION: ap-south-1
      S3_INGESTION_BUCKET: promptflow-ingestion-dev

      DIRECTORY_API_URL: "http://mock-directory:8080"
      DIRECTORY_TIMEOUT_SECONDS: "3"
      DIRECTORY_MAX_RETRIES: "2"

      DATABASE_URL: "postgresql://promptflow:secret@postgres:5432/promptflow"

      BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
      LLM_CONFIDENCE_THRESHOLD: "0.70"
      LLM_CONFIDENCE_CAP: "0.90"

      DEFAULT_CONFIDENCE_THRESHOLD: "0.75"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
