version: "3.9"

# Module 3: AI Extraction Worker
#
# Like Modules 2/5/6, this does NOT run its own Kafka/Zookeeper/Redis/
# Postgres. The original version of this file spun up a fourth
# independent Kafka cluster (m3_kafka/m3_zookeeper) with no
# `networks:` section at all — fully isolated on Docker's default
# bridge network, unable to reach Module 2's producer OR Module 4's
# consumer regardless of matching topic names. Same story for Postgres
# (unused — Module 3's own database_url setting is dead code, same
# situation as Module 2's was) and Redis (idempotency dedup can live on
# Module 4's shared instance same as everything else).
#
# Prerequisite:
#   cd ../module4-storage && docker compose up -d postgres redis kafka zookeeper kafka-init
#   cd ../module2-email-worker && docker compose up -d kafka-init   # creates ingest.raw
#   cd ../module1-auth && docker compose up -d                       # directory API + M2M auth
#
# Then from THIS directory:
#   docker compose up -d --build
#
# No kafka-init here: Module 4's kafka-init already creates
# papers.validated/review/failed + dlq.ingestion.failed, and Module 2's
# kafka-init creates ingest.raw — every topic Module 3 touches already
# exists on the shared broker by the time both of those have run.

services:
  # ── Mock Directory API (standalone-testing fallback only) ─────────────
  # Real integration should use Module 1's actual directory endpoint
  # (GET /api/faculty/{lookup_key}, M2M-authenticated — see
  # module1-auth/app/routes/directory.py). This mock never returns a
  # real faculty_id UUID at all, so results always fall back to the
  # "unresolved" sentinel — fine for exercising the extraction cascade
  # in isolation, not a substitute for the real directory when testing
  # against Module 4. Not in the worker's depends_on; start it manually
  # with `docker compose up -d mock-directory` if you want it, and set
  # DIRECTORY_API_URL=http://mock-directory:8080 to use it instead.
  mock-directory:
    build:
      context: ./mock_directory
      dockerfile: Dockerfile
    container_name: m3_mock_directory
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - promptflow_shared_net

  # ── Module 3 Worker ───────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m3_ai_extraction_worker
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO

      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP: module3-ai-extraction
      KAFKA_TOPIC_INGEST_RAW: ingest.raw
      KAFKA_TOPIC_PAPERS_VALIDATED: papers.validated
      KAFKA_TOPIC_PAPERS_REVIEW: papers.review
      KAFKA_TOPIC_PAPERS_FAILED: papers.failed
      KAFKA_TOPIC_DLQ: dlq.ingestion.failed

      REDIS_URL: "redis://:localdevtoken@redis:6379"

      AWS_REGION: ap-south-1
      S3_INGESTION_BUCKET: promptflow-ingestion-dev

      # Real directory API (Module 1) by default — see comment above
      # for the mock-directory alternative.
      DIRECTORY_API_URL: "http://auth:8000"
      DIRECTORY_TIMEOUT_SECONDS: "3"
      DIRECTORY_MAX_RETRIES: "2"
      AUTH_SERVICE_URL: "http://auth:8000"
      M2M_CLIENT_ID: "module3-ai-worker"
      # Provision this with: cd module1-auth && python scripts/create_service_account.py module3-ai-worker "Module 3 AI Worker"
      M2M_CLIENT_SECRET: "${M2M_CLIENT_SECRET}"

      # NOTE: unlike Module 2, nothing in Module 3's code actually reads
      # this yet (no audit logging wired up here) — present for parity/
      # future use, not currently load-bearing.
      DATABASE_URL: "postgresql://promptflow:secret@postgres:5432/promptflow"

      BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
      LLM_CONFIDENCE_THRESHOLD: "0.70"
      LLM_CONFIDENCE_CAP: "0.90"

      DEFAULT_CONFIDENCE_THRESHOLD: "0.75"
    restart: on-failure
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - promptflow_shared_net

networks:
  promptflow_shared_net:
    external: true
    name: promptflow_shared_net
