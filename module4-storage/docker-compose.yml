version: "3.9"

services:

  # ── PostgreSQL 15 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: m4_postgres
    environment:
      POSTGRES_USER: promptflow
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: promptflow
    ports:
      - "5433:5432"
    volumes:
      - m4_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U promptflow -d promptflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - m4_net

  # ── Redis (idempotency cache) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: m4_redis
    command: redis-server --requirepass localdevtoken
    ports:
      - "6380:6379"
    volumes:
      - m4_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "localdevtoken", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - m4_net

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: m4_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo ruok | nc localhost 2181" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - m4_net

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: m4_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9093:9093"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092" ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - m4_net

  # ── Kafka Topic Initializer ───────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: m4_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      bash -c '
        for topic in papers.validated papers.review papers.failed dlq.ingestion.failed; do
          kafka-topics \
            --bootstrap-server kafka:29092 \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions 3 \
            --replication-factor 1
        done
        echo "All topics created."
      '
    networks:
      - m4_net

  # ── Module 4 Kafka Consumer ───────────────────────────────────────────────
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m4_consumer
    command: python -m app.consumer
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql+asyncpg://promptflow:secret@postgres:5432/promptflow
      REDIS_URL: redis://:localdevtoken@redis:6379
    # Embedding model (sentence-transformers/all-mpnet-base-v2) needs
    # headroom beyond default Docker Desktop limits on some machines.
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - m4_net

  # ── Module 4 FastAPI ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m4_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://promptflow:secret@postgres:5432/promptflow
      REDIS_URL: redis://:localdevtoken@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - m4_net

volumes:
  m4_postgres_data:
  m4_redis_data:

networks:
  m4_net:
    driver: bridge
    name: promptflow_shared_net
      # fixed name so Module 5 (or others) can join
      # via 'external: true' regardless of which
      # directory this compose project lives in
