version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: promptflow_postgres
    environment:
      POSTGRES_USER: promptflow
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: promptflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: promptflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promptflow_auth
    environment:
      DATABASE_URL: postgresql://promptflow:secret@postgres:5432/promptflow
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      JWT_PRIVATE_KEY_PATH: keys/private.pem
      JWT_PUBLIC_KEY_PATH: keys/public.pem
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
